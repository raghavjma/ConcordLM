# ============================================================
# ConcordLM — RLHF (PPO) Configuration
# Stage 3 (Optional): Reward model + PPO fine-grained alignment
# ============================================================

inherit: base.yaml

stage: "rlhf"

training:
  output_dir: "./outputs/rlhf"
  learning_rate: 1.0e-6
  num_train_epochs: 1
  max_steps: -1

reward_model:
  output_dir: "./outputs/reward_model"
  learning_rate: 1.0e-5
  num_train_epochs: 1
  per_device_train_batch_size: 4
  max_length: 512

ppo:
  learning_rate: 1.0e-6
  batch_size: 16
  mini_batch_size: 4
  ppo_epochs: 4
  kl_penalty: "kl"              # "kl" | "abs" | "mse" | "full"
  init_kl_coef: 0.2
  adap_kl_ctrl: true
  target_kl: 6.0
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9

data:
  dataset_name: "trl-lib/ultrafeedback_binarized"
  dataset_split: "train"

# Paths to prior stage outputs
sft_model_path: null             # Path to SFT model
dpo_model_path: null             # Optional: start from DPO model instead
