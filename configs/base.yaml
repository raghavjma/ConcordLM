# ============================================================
# ConcordLM — Base Configuration
# Shared defaults inherited by all stage configs.
# ============================================================

model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"
  quantization: "4bit"          # "none" | "4bit" | "8bit"
  dtype: "bfloat16"             # "float32" | "float16" | "bfloat16"
  trust_remote_code: false
  use_flash_attention: true     # Requires NVIDIA GPU / CUDA. Set to true if on a cloud GPU.
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "v_proj"

training:
  output_dir: "./outputs"
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  bf16: true
  fp16: false
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  eval_strategy: "steps"
  eval_steps: 100
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  report_to: "tensorboard"      # "tensorboard" | "wandb" | "none"
  dataloader_num_workers: 4

data:
  max_samples: null              # null = use entire dataset
  eval_split_ratio: 0.05         # Fraction held out for evaluation
  preprocessing_num_workers: 4
